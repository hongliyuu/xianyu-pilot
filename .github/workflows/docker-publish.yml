name: Build and Publish Docker Images

# 每次推送到 main 分支自动构建 api/web/crawler 镜像并推送到 GHCR。
# 也可在 Actions 页面手动触发。镜像标签：latest + git 短 SHA。
# 多架构（linux/amd64 + linux/arm64）manifest，覆盖 x86 服务器与 Apple Silicon Mac。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # 镜像命名空间，与 docker-compose.yml 中各服务的 image 默认值保持一致。
  # 如需修改，同步更新 .env.example 的镜像变量与 docker-compose.yml。
  IMAGE_NAMESPACE: hongliyuu

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: ./apps/api
          - component: web
            context: ./apps/web
          - component: crawler
            context: ./apps/crawler
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/xianyu-assistant-${{ matrix.component }}:latest
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/xianyu-assistant-${{ matrix.component }}:${{ steps.tags.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: false
