server {
  listen 12400 default_server;
  listen [::]:12400 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  client_max_body_size 12m;
  client_body_timeout 30s;
  client_header_timeout 15s;
  send_timeout 60s;
  large_client_header_buffers 4 16k;

  # Only the fixed Docker edge gateway may assert the client address supplied
  # by the same-host TLS proxy. The published port remains loopback-only.
  set_real_ip_from 172.30.243.1;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'" always;

  location = /healthz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok","service":"web"}\n';
  }

  # End-to-end readiness is intentionally separate from Web process liveness.
  # Load balancers and deployment verification must use this endpoint so an
  # unavailable API, database, Redis, or required background runtime drains the
  # instance instead of serving a superficially healthy shell.
  location = /readyz {
    access_log off;
    proxy_pass http://api:12401/health/edge-ready;
    proxy_http_version 1.1;
    proxy_connect_timeout 3s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
    proxy_next_upstream off;
    proxy_intercept_errors on;
    error_page 500 502 503 504 = @dependency_not_ready;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $sanitized_forwarded_proto;
    proxy_hide_header Server;
  }

  location @dependency_not_ready {
    internal;
    access_log off;
    default_type application/json;
    expires -1;
    return 503 '{"status":"not_ready","service":"web","reason":"required_dependency_unavailable"}\n';
  }

  # Keep credential guessing below the application-level shared lockout. This
  # edge bucket is keyed after the trusted TLS adapter has replaced the client
  # address, so one hostile client cannot consume every user's allowance.
  location = /api/auth/login {
    limit_req zone=login_per_ip burst=4 nodelay;
    limit_conn connections_per_ip 5;
    error_page 429 = @login_rate_limited;
    proxy_pass http://api:12401/api/auth/login;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_request_buffering on;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $sanitized_forwarded_proto;
    proxy_hide_header Server;
  }

  location @login_rate_limited {
    internal;
    default_type application/json;
    add_header Retry-After 60 always;
    return 429 '{"code":429,"msg":"登录请求过于频繁，请稍后重试","data":null}\n';
  }

  location = /index.html {
    expires -1;
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
    expires 7d;
    try_files $uri =404;
  }

  location /api/sse/ {
    limit_req zone=api_per_ip burst=20 nodelay;
    limit_conn connections_per_ip 5;
    proxy_pass http://api:12401/api/sse/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 65m;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $sanitized_forwarded_proto;
  }

  location /api/ {
    limit_req zone=api_per_ip burst=60 nodelay;
    limit_conn connections_per_ip 30;
    proxy_pass http://api:12401/api/;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 310s;
    proxy_read_timeout 310s;
    proxy_request_buffering on;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $sanitized_forwarded_proto;
    proxy_hide_header Server;
  }

  location /uploads/ {
    limit_except GET { deny all; }
    proxy_pass http://api:12401/uploads/;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $sanitized_forwarded_proto;
    proxy_hide_header Server;
  }

  location ~ /\. { deny all; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
